openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: XAUUSD Trading Signal API — Gold Signal Pro
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: signals
    description: Trading signal operations
  - name: analysis
    description: Market analysis & SMC operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /signals/active:
    get:
      operationId: getActiveSignals
      tags: [signals]
      summary: Get all active trading signals
      responses:
        "200":
          description: Active signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /signals:
    post:
      operationId: createSignal
      tags: [signals]
      summary: Create a new trading signal manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalInput"
      responses:
        "201":
          description: Signal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /signals/{id}/expire:
    patch:
      operationId: expireSignal
      tags: [signals]
      summary: Expire a signal manually
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpireRequest"
      responses:
        "200":
          description: Signal expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /signals/history:
    get:
      operationId: getSignalHistory
      tags: [signals]
      summary: Get signal history (last 50)
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /analysis/market:
    get:
      operationId: getMarketAnalysis
      tags: [analysis]
      summary: Get full XAUUSD market analysis with SMC + auto signal
      description: >
        Fetches real XAUUSD (GC=F) price data, runs full SMC analysis
        (FVG, Order Block, Liquidity, CHoCH, BOS, S&D, S&R, RBS, SBR,
        Retest, Pullback, HNSS), calculates MA27/MA54/Stochastic,
        identifies candlestick patterns, and auto-generates a signal if
        strong confluence is found.
      responses:
        "200":
          description: Full market analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketAnalysis"

  /analysis/stats:
    get:
      operationId: getSignalStats
      tags: [analysis]
      summary: Get signal performance statistics
      responses:
        "200":
          description: Signal statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalStats"

  /analysis/candles:
    get:
      operationId: getCandles
      tags: [analysis]
      summary: Get recent XAUUSD OHLCV candle data
      responses:
        "200":
          description: Candle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Signal:
      type: object
      required:
        - id
        - type
        - entryPrice
        - takeProfit
        - stopLoss
        - area
        - reason
        - status
        - timeframe
        - createdAt
        - expiresAt
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [BUY, SELL]
        entryPrice:
          type: number
        takeProfit:
          type: number
        stopLoss:
          type: number
        area:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [ACTIVE, EXPIRED, HIT_TP, HIT_SL]
        timeframe:
          type: string
        rrRatio:
          type: ["number", "null"]
        confidence:
          type: ["integer", "null"]
        smcContext:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    SignalInput:
      type: object
      required:
        - type
        - entryPrice
        - takeProfit
        - stopLoss
        - area
        - reason
      properties:
        type:
          type: string
          enum: [BUY, SELL]
        entryPrice:
          type: number
        takeProfit:
          type: number
        stopLoss:
          type: number
        area:
          type: string
        reason:
          type: string
        timeframe:
          type: string
        rrRatio:
          type: number
        confidence:
          type: integer
        smcContext:
          type: string

    ExpireRequest:
      type: object
      properties:
        note:
          type: string

    SmcZone:
      type: object
      required:
        - type
        - high
        - low
        - direction
        - strength
      properties:
        type:
          type: string
          description: "FVG | ORDER_BLOCK | LIQUIDITY | CHOCH | BOS | DEMAND | SUPPLY | SUPPORT | RESISTANCE | RBS | SBR | RETEST | PULLBACK | HNSS"
        high:
          type: number
        low:
          type: number
        direction:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        strength:
          type: string
          enum: [WEAK, MEDIUM, STRONG]
        description:
          type: string

    Indicator:
      type: object
      required:
        - rsi
        - ma27
        - ma54
        - stochK
        - stochD
        - atr
      properties:
        rsi:
          type: number
        ma27:
          type: number
        ma54:
          type: number
        stochK:
          type: number
        stochD:
          type: number
        atr:
          type: number
        maSignal:
          type: string
          description: "BULLISH | BEARISH | NEUTRAL based on MA27 vs MA54 crossover"
        stochSignal:
          type: string
          description: "OVERBOUGHT | OVERSOLD | NEUTRAL"

    CandlestickPattern:
      type: object
      properties:
        name:
          type: string
        direction:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        strength:
          type: string
          enum: [WEAK, MEDIUM, STRONG]

    AutoSignal:
      type: object
      required:
        - recommendation
      properties:
        recommendation:
          type: string
          enum: [BUY, SELL, WAIT]
        entryPrice:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]
        stopLoss:
          type: ["number", "null"]
        area:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
        rrRatio:
          type: ["number", "null"]
        confidence:
          type: ["integer", "null"]
        confluenceScore:
          type: integer
        confluenceDetails:
          type: array
          items:
            type: string

    MarketAnalysis:
      type: object
      required:
        - bias
        - currentPrice
        - trend
        - keyLevels
        - indicators
        - smcZones
        - signal
        - summary
        - updatedAt
        - dataSource
        - timeframe
      properties:
        bias:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        currentPrice:
          type: number
        prevClose:
          type: number
        changePercent:
          type: number
        trend:
          type: string
        timeframe:
          type: string
        dataSource:
          type: string
        keyLevels:
          type: object
          properties:
            support:
              type: array
              items:
                type: number
            resistance:
              type: array
              items:
                type: number
            pivot:
              type: number
        fibLevels:
          type: object
          properties:
            fib236:
              type: number
            fib382:
              type: number
            fib500:
              type: number
            fib618:
              type: number
            fib786:
              type: number
        indicators:
          $ref: "#/components/schemas/Indicator"
        smcZones:
          type: array
          items:
            $ref: "#/components/schemas/SmcZone"
        candlestick:
          $ref: "#/components/schemas/CandlestickPattern"
        signal:
          $ref: "#/components/schemas/AutoSignal"
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time

    SignalStats:
      type: object
      required:
        - totalSignals
        - hitTP
        - hitSL
        - expired
        - winRate
        - avgRR
      properties:
        totalSignals:
          type: integer
        hitTP:
          type: integer
        hitSL:
          type: integer
        expired:
          type: integer
        winRate:
          type: number
        avgRR:
          type: number

    Candle:
      type: object
      required:
        - time
        - open
        - high
        - low
        - close
        - volume
      properties:
        time:
          type: string
          format: date-time
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    CandleResponse:
      type: object
      required:
        - symbol
        - timeframe
        - candles
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
